# PakGen spec: procedural cubes scene using the procedural cube script
# Similar layout to scene_v1_content_scene_input_core_spec.yaml

version: 6
content_version: 2

scripts:
  - name: scene_proc_cubes_lua_src
    language: luau
    encoding: source
    compression: none
    file: scene_proc_cubes_script.lua

assets:
  - type: script
    name: SceneProcCubesScript
    asset_key: "3f4a8f7c1b2d4e6f8a9b0c1d2e3f4567"
    source_resource: scene_proc_cubes_lua_src

  - type: material
    name: ProcCubeBaseMat
    asset_key: "b0f1a2c3d4e5f67890abcd123456ef01"
    alignment: 1
    material_domain: 1
    shader_stages: 0
    base_color: [0.7, 0.7, 0.7, 1.0]
    metalness: 0.0
    roughness: 0.7
    ambient_occlusion: 1.0

  - type: material
    name: ProcCubeAccentMat
    asset_key: "a1b2c3d4e5f607182736455667788990"
    alignment: 1
    material_domain: 1
    shader_stages: 0
    base_color: [0.8, 0.3, 0.2, 1.0]
    metalness: 0.0
    roughness: 0.4
    ambient_occlusion: 1.0

  - type: scene
    name: SceneProcCubes
    asset_key: "d4e5f6a7b8c90123456789abcdef0123"
    alignment: 1
    nodes:
      - name: Root
        parent: 0
        flags: 0

      - name: ProcHost
        parent: 0
        flags: 0
        translation: [0.0, 0.0, 0.0]
        rotation: [0.0, 0.0, 0.0, 1.0]
        scale: [1.0, 1.0, 1.0]

    scripting:
      - node_index: 1
        slots:
          - script_asset: SceneProcCubesScript
            execution_order: 0
            params:
              - key: count
                type: int
                value: 200
              - key: cell_size
                type: float
                value: 1.0
              - key: min_scale
                type: float
                value: 0.5
              - key: max_scale
                type: float
                value: 1.1
              - key: material_guids
                type: string
                value: "b0f1a2c3-d4e5-f678-90ab-cd123456ef01"
              - key: max_prepare_steps_per_frame
                type: int
                value: 250
              - key: max_spawns_per_frame
                type: int
                value: 30

    perspective_cameras:
      - node_index: 0
        fov_y: 0.785398
        aspect_ratio: 1.777778
        near_plane: 0.1
        far_plane: 100.0

    directional_lights:
      - node_index: 0
        affects_world: true
        color_rgb: [1.0, 1.0, 1.0]
        intensity_lux: 12000.0
        mobility: 0
        casts_shadows: 1
        angular_size_radians: 0.004675
        environment_contribution: true
        is_sun_light: true
